# ── RootsAndQi FastAPI Backend ────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rootsandqi-api
  namespace: rootsandqi
  labels:
    app: rootsandqi-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rootsandqi-api
  template:
    metadata:
      labels:
        app: rootsandqi-api
    spec:
      containers:
      - name: api
        image: 445160884854.dkr.ecr.us-east-2.amazonaws.com/rootsandqi-api:latest
        ports:
        - containerPort: 8000
        env:
        - name: LLM_PROVIDER
          value: "anthropic"
        - name: QDRANT_URL
          value: "http://qdrant:6333"
        - name: ANTHROPIC_API_KEY
          valueFrom:
            secretKeyRef:
              name: rootsandqi-secrets
              key: anthropic-api-key
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "300m"
        readinessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8000
          initialDelaySeconds: 30
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: rootsandqi-api
  namespace: rootsandqi
spec:
  selector:
    app: rootsandqi-api
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 8000
