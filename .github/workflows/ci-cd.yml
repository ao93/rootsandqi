# ── RootsAndQi CI/CD Pipeline ─────────────────────────────────────────────────
# Triggered on every push to main.
# Jobs: lint → trivy scan → build & push to ECR → deploy to EKS

name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  AWS_REGION: us-east-2
  ECR_REGISTRY: 445160884854.dkr.ecr.us-east-2.amazonaws.com
  ECR_REPOSITORY: rootsandqi-api

jobs:
  # ── Job 1: Lint ─────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install linting tools
        run: pip install ruff

      - name: Run ruff linter
        run: ruff check app/ --ignore E501

  # ── Job 2: Security Scan ────────────────────────────────────────────────────
  trivy-scan:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Build image for scanning
        run: docker build -t rootsandqi:scan .

      - name: Run Trivy vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: rootsandqi:scan
          format: table
          exit-code: 0
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  # ── Job 3: Build & Push to ECR ──────────────────────────────────────────────
  build-and-push:
    name: Build & Push to ECR
    runs-on: ubuntu-latest
    needs: trivy-scan
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build, tag, and push image to ECR
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          docker build --platform linux/amd64 -t $IMAGE .
          docker tag $IMAGE $ECR_REGISTRY/$ECR_REPOSITORY:latest
          docker push $IMAGE
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:latest

  # ── Job 4: Deploy to EKS ────────────────────────────────────────────────────
  deploy:
    name: Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-2

      - name: Install kubectl
        uses: azure/setup-kubectl@v3

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region us-east-2

      - name: Update Anthropic API key secret
        run: |
          kubectl delete secret rootsandqi-secrets -n rootsandqi --ignore-not-found
          kubectl create secret generic rootsandqi-secrets \
            --namespace rootsandqi \
            --from-literal=anthropic-api-key=${{ secrets.ANTHROPIC_API_KEY }}

      - name: Deploy to EKS
        run: |
          IMAGE=$ECR_REGISTRY/$ECR_REPOSITORY:${{ github.sha }}
          kubectl apply -f infra/k8s/namespace.yaml
          kubectl apply -f infra/k8s/qdrant.yaml
          kubectl apply -f infra/k8s/api.yaml
          kubectl set image deployment/rootsandqi-api api=$IMAGE -n rootsandqi
          kubectl rollout status deployment/rootsandqi-api -n rootsandqi --timeout=300s || true

      - name: Verify deployment
        run: |
          kubectl get pods -n rootsandqi
          kubectl get svc -n rootsandqi
